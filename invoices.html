<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQUENTA - Invoices</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/invoices.css">
  <link rel="stylesheet" href="styles/topbar-global.css">
  <link rel="icon" type="image/png" href="assets/images/Aquenta_logo.png">
</head>
<body>
  <div id="notificationContainer" class="notification-container"></div>

  <div class="app-container">
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-circle">
            <img src="/assets/images/Aquenta_logo.png" alt="Aquenta Logo" class="logo-img">
          </div>
          <span class="logo-text">AQUENTA</span>
        </div>
        <button id="closeSidebar" class="close-btn" aria-label="Close sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <nav class="nav">
        <a href="admin-dashboard" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Dashboard</span>
        </a>
        <a href="billing" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          <span>Billing</span>
        </a>
        <a href="invoices" class="nav-item active" aria-current="page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <span>Invoices</span>
        </a>
        <a href="customer-record" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span>Customer Records</span>
        </a>
        <a href="payment" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          <span>Payments</span>
        </a>
        <a href="tariffs" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 4v16"></path>
            <path d="M9 5h5a3.5 3.5 0 0 1 0 7H9"></path>
            <line x1="5" y1="8" x2="20" y2="8"></line>
            <line x1="5" y1="11" x2="20" y2="11"></line>
          </svg>
          <span>Tariffs</span>
        </a>
        <a href="reports" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <span>Reports</span>
        </a>
      </nav>
    </aside>

    <div class="main-container">
      <header class="topbar">
        <div>
          <div class="topbar-left">
            <button id="menuBtn" class="menu-btn" aria-label="Open sidebar">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              </svg>
            </button>
            <h1 class="page-title">Invoices</h1>
          </div>
          <div class="topbar-right">
            <div class="admin-info-wrapper">
              <div class="admin-info" id="adminInfoBtn">
                <div class="admin-details">
                  <span class="admin-label">Admin Staff</span>
                  <span class="admin-role">Admin Account</span>
                </div>
                <div class="admin-profile">
                  <div class="avatar" id="adminAvatar">AS</div>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron-down">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </div>
              </div>

              <!-- Profile Dropdown -->
              <div class="profile-dropdown" id="adminDropdown">
                <button class="profile-dropdown-item logout" id="adminLogoutBtn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                  </svg>
                  <span>Logout</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <div class="invoice-container">
          <div class="invoice-header">
            <h2 class="invoice-title">Invoice Summary</h2>
            <button id="printAllInvoicesBtn" class="invoice-print-all-btn" type="button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <rect x="6" y="14" width="12" height="8"></rect>
              </svg>
              Print All Invoices
            </button>
          </div>

          <div class="invoice-filters">
            <div class="search-box">
              <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              <input type="text" id="invoiceSearch" class="search-input" placeholder="Search by Name or Account #">
            </div>
            <div class="filter-group">
              <select id="invoicePeriodFilter" class="date-input" aria-label="Filter invoices by date">
                <option value="">Loading periods...</option>
              </select>
            </div>
          </div>

          <div class="invoice-content">
            <div class="table-wrapper">
              <table class="invoice-table">
                <thead>
                  <tr>
                    <th>Account #</th>
                    <th>Name</th>
                    <th>Meter Number</th>
                    <th>Address</th>
                    <th>Contact No.</th>
                    <th>Rate Class</th>
                    <th>Period Cover</th>
                    <th>Present</th>
                    <th>Previous</th>
                    <th>Consumed</th>
                    <th>Amount</th>
                    <th>Arrears</th>
                    <th>LP / RF</th>
                    <th>Total</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="invoiceRows"></tbody>
              </table>
            </div>
          </div>

          <div class="invoice-pagination-host"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Edit Invoice Modal -->
  <div id="editInvoiceModal" class="modal" style="display:none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center;">
    <div class="modal-overlay" id="editInvoiceOverlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.5);"></div>
    <div class="modal-content" style="position: relative; background: white; padding: 24px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
      <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-size: 1.25rem; font-weight: 600;">Edit Invoice Adjustment</h2>
        <button class="modal-close" id="closeEditInvoiceModal" style="background: none; border: none; cursor: pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <form id="editInvoiceForm" class="modal-form" autocomplete="off">
        <input type="hidden" id="editBillingId">
        <div class="form-group" style="margin-bottom: 16px;">
          <label for="editAmount" style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 4px;">Bill Amount</label>
          <input type="number" id="editAmount" placeholder="Enter bill amount" step="0.01" required style="width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>
        <div class="form-group" style="margin-bottom: 24px;">
          <label for="editLPRF" style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 4px;">LP / RF (Penalty)</label>
          <input type="number" id="editLPRF" placeholder="Enter penalty amount" step="0.01" required style="width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>
        <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px;">
          <button type="button" class="btn btn-cancel" id="cancelEditInvoice" style="padding: 8px 16px; border: 1px solid #d1d5db; background: white; border-radius: 6px; cursor: pointer;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- SECURITY GUARD: Validate session before rendering page content -->
  <script src="/script/admin-security-guard.js"></script>
  <script src="/script/api-client.js"></script>
  <script src="/script/admin-topbar.js"></script>
  <script src="/script/invoices.js"></script>
</body>
</html>
