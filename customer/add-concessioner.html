<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQUENTA - Add Concessioner</title>
  <link rel="stylesheet" href="../styles/admin-dashboard.css">
  <link rel="stylesheet" href="../styles/customer-records.css">
  <link rel="stylesheet" href="../styles/topbar-global.css">
</head>
<body data-page="add-concessioner">
  <div class="app-container">
    <!-- Mobile Overlay -->
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar open">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-circle">
            <img src="/assets/images/Aquenta_logo.png" alt="Aquenta Logo" class="logo-img">
          </div>
          <span class="logo-text">AQUENTA</span>
        </div>
        <button id="closeSidebar" class="close-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <nav class="nav">
        <a href="../admin-dashboard.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Dashboard</span>
        </a>
        <button class="nav-item" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          <span>Billing</span>
        </button>
        <a href="../invoices.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <span>Invoices</span>
        </a>
        <a href="../customer-record.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span>Customer Records</span>
        </a>
        <a href="../payment.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          <span>Payments</span>
        </a>
        <a href="../tariffs.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 4v16"></path>
            <path d="M9 5h5a3.5 3.5 0 0 1 0 7H9"></path>
            <line x1="5" y1="8" x2="20" y2="8"></line>
            <line x1="5" y1="11" x2="20" y2="11"></line>
          </svg>
          <span>Tariffs</span>
        </a>
        <a href="../reports.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <span>Reports</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-container">
      <header class="topbar">
        <div>
          <div class="topbar-left">
            <button id="menuBtn" class="menu-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              </svg>
            </button>
            <h1 class="page-title">Customer Records</h1>
          </div>
          <div class="topbar-right">
            <div class="admin-info">
              <div class="admin-details">
                <span class="admin-label">Admin Staff</span>
                <span class="admin-role">Admin Account</span>
              </div>
              <div class="admin-profile">
                <div class="avatar">AS</div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron-down">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="customer-header">
          <div class="customer-header-top">
            <h2 class="customer-header-title">Add Concessioner</h2>
            <a href="../customer-record.html" class="back-link back-primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              <span>Back to Concessioner List</span>
            </a>
          </div>
        </section>

        <section class="customer-table-card">
          <form id="concessionerForm" novalidate autocomplete="off">
          <!-- Personal Information -->
          <section class="concessioner-section">
            <div class="concessioner-section-header">
              <h4 class="concessioner-section-title">Personal Information</h4>
            </div>
            <div class="concessioner-grid">
              <div class="form-field">
                <label class="form-label" for="firstName">First Name <span class="required">*</span></label>
                <input
                  type="text"
                  id="firstName"
                  name="firstName"
                  class="form-input"
                  placeholder="Enter first name"
                />
              </div>
              <div class="form-field">
                <label class="form-label" for="lastName">Last Name <span class="required">*</span></label>
                <input
                  type="text"
                  id="lastName"
                  name="lastName"
                  class="form-input"
                  placeholder="Enter last name"
                />
              </div>
              <div class="form-field field-full">
                <label class="form-label" for="address">Address</label>
                <input
                  type="text"
                  id="address"
                  name="address"
                  class="form-input"
                  placeholder="Enter address"
                />
              </div>
              <div class="form-field">
                <label class="form-label" for="contactNumber">Contact Number</label>
                <input
                  type="text"
                  id="contactNumber"
                  name="contactNumber"
                  class="form-input"
                  placeholder="09XX XXX XXXX"
                />
              </div>
              <div class="form-field">
                <label class="form-label" for="email">Email Address</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-input"
                  placeholder="Enter email address"
                />
              </div>
            </div>
          </section>

          <!-- Service Address & Connection Details -->
          <section class="concessioner-section">
            <div class="concessioner-section-header">
              <h4 class="concessioner-section-title">Service Address &amp; Connection Details</h4>
            </div>
            <div class="concessioner-grid">
              <div class="form-field">
                <label class="form-label" for="accountNumber">Account Number <span class="required">*</span></label>
                <input
                  type="text"
                  id="accountNumber"
                  name="accountNumber"
                  class="form-input"
                  placeholder="Enter Account Number"
                />
              </div>
              <div class="form-field">
                <label class="form-label" for="meterNumber">Meter Number <span class="required">*</span></label>
                <input
                  type="text"
                  id="meterNumber"
                  name="meterNumber"
                  class="form-input"
                  placeholder="Enter Meter Number"
                />
              </div>
              <div class="form-field">
                <label class="form-label" for="districtSequence">Account Order <span class="required">*</span></label>
                <input
                  type="number"
                  id="districtSequence"
                  name="districtSequence"
                  class="form-input"
                  min="1"
                  step="1"
                  placeholder="Enter Account Order"
                  required
                />
              </div>
              <div class="form-field">
                <label class="form-label" for="district">District/Purok <span class="required">*</span></label>
                <select id="district" name="district" class="form-select">
                  <option value="">Select district</option>
                  <option>Purok 1</option>
                  <option>Purok 2</option>
                  <option>Purok 3</option>
                  <option>Purok 4</option>
                  <option>Purok 5</option>
                  <option>Purok 6</option>
                  <option>Purok 7</option>
                </select>
              </div>
            </div>
          </section>

          <!-- Billing Information -->
          <section class="concessioner-section">
            <div class="concessioner-section-header">
              <h4 class="concessioner-section-title">Billing Information</h4>
            </div>
            <div class="concessioner-grid">
              <div class="form-field">
                <label class="form-label" for="rateClassification">Rate Classification <span class="required">*</span></label>
                <select id="rateClassification" name="rateClassification" class="form-select">
                  <option value="">Select rate</option>
                  <option>Residential</option>
                  <option>Commercial</option>
                </select>
              </div>
              <div class="form-field">
                <label class="form-label" for="connectionStatus">Connection Status <span class="required">*</span></label>
                <select id="connectionStatus" name="connectionStatus" class="form-select">
                  <option value="">Select connection status</option>
                  <option>Active</option>
                  <option>Disconnected</option>
                  <option>Inactive</option>
                  <option>Delinquent</option>
                </select>
              </div>
              <div class="form-field">
                <label class="form-label" for="membership">Membership <span class="required">*</span></label>
                <select id="membership" name="membership" class="form-select">
                  <option value="">Select membership</option>
                  <option>Member</option>
                  <option>Non-Member</option>
                  <option>Full Subsidy</option>
                </select>
              </div>
            </div>
          </section>

          <div class="concessioner-footer">
            <a href="../customer-record.html" class="btn-secondary">Cancel</a>
            <button class="btn-primary" type="submit">Add Concessioner</button>
          </div>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="../script/api-client.js"></script>
  <script src="../script/admin-topbar.js"></script>
  <script src="../script/customer-records.js"></script>
</body>
</html>
