<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQUENTA - My Account</title>
  <link rel="stylesheet" href="../styles/concessioner.css">
  <link rel="icon" type="image/png" href="../assets/images/Aquenta_logo.png">
</head>
<body>
  <div id="notificationContainer" class="notification-container" aria-live="polite" aria-atomic="true"></div>
  <div class="app-container">
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-circle"><img src="/assets/images/Aquenta_logo.png" alt="Aquenta Logo" class="logo-img"></div>
          <span class="logo-text">AQUENTA</span>
        </div>
        <button id="closeSidebar" class="close-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <nav class="nav">
        <a href="dashboard" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span>Dashboard</span>
        </a>
        <a href="billing-history" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
          <span>Billing History</span>
        </a>
        <a href="payment-history" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 4v16"></path><path d="M9 5h5a3.5 3.5 0 0 1 0 7H9"></path><line x1="5" y1="8" x2="20" y2="8"></line><line x1="5" y1="11" x2="20" y2="11"></line></svg>
          <span>Payment History</span>
        </a>
        <a href="account" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <span>My Account</span>
        </a>
      </nav>
    </aside>

    <div class="main-container">
      <header class="topbar">
        <div>
          <div class="topbar-left">
            <button id="menuBtn" class="menu-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="page-title">My Account</h1>
          </div>
          <div class="topbar-right">
            <div class="user-info-wrapper">
              <div class="user-info" id="userInfoBtn">
                <div class="user-details" style="text-align: right;">
                  <span class="user-name" id="topbarUserName">--</span>
                  <span class="user-role">Concessioner Account</span>
                </div>
                <div class="user-profile">
                  <div class="avatar" id="topbarAvatar">--</div>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron-down">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </div>
              </div>

              <!-- Profile Dropdown -->
              <div class="profile-dropdown" id="profileDropdown">
                <a href="account" class="profile-dropdown-item">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                  <span>My Account</span>
                </a>
                <div style="border-top:1px solid #f1f5f9; margin:4px 0;"></div>
                <button class="profile-dropdown-item logout" onclick="conGuardLogout()">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                  </svg>
                  <span>Logout</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <div class="section-card">
          <div class="section-card-header">
            <h3 class="section-card-title">Account Information</h3>
            <div style="display:flex; align-items:center; gap:12px;">
              <span class="save-msg" id="saveMsg">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Saved!
              </span>
              <button class="btn-secondary" id="changePasswordBtn" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Change Password
              </button>
            </div>
          </div>

          <div id="accountContent">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="changePasswordModal" class="modal" aria-hidden="true">
    <div class="modal-overlay" id="changePasswordOverlay"></div>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="changePasswordTitle">
      <div class="modal-header">
        <h2 id="changePasswordTitle">Change Password</h2>
        <button class="modal-close" id="changePasswordCloseBtn" type="button" aria-label="Close change password modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <form id="changePasswordForm" class="modal-form" method="POST" autocomplete="off">
        <div id="changePasswordMessage" class="modal-message" role="alert"></div>

        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <div class="password-field">
            <input type="password" id="currentPassword" placeholder="Enter current password" required>
            <button type="button" class="password-toggle" data-target="currentPassword" aria-label="Show current password" aria-pressed="false">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94"></path>
                <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.79 21.79 0 0 1-3.22 4.93"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-field">
            <input type="password" id="newPassword" placeholder="Enter new password" required>
            <button type="button" class="password-toggle" data-target="newPassword" aria-label="Show new password" aria-pressed="false">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94"></path>
                <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.79 21.79 0 0 1-3.22 4.93"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <div class="password-field">
            <input type="password" id="confirmNewPassword" placeholder="Re-enter new password" required>
            <button type="button" class="password-toggle" data-target="confirmNewPassword" aria-label="Show confirm password" aria-pressed="false">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94"></path>
                <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.79 21.79 0 0 1-3.22 4.93"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-cancel" id="changePasswordCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="changePasswordSubmitBtn">Update Password</button>
        </div>
      </form>
    </div>
  </div>

  <!-- SECURITY GUARD: Validate session before rendering page content -->
  <script src="../script/api-client.js"></script>
  <script src="../script/concessioner-guard.js"></script>
  <script src="../script/concessioner-security-guard.js"></script>
  <script src="../script/concessioner-account.js"></script>
</body>
</html>
