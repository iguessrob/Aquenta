<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUENTA - Reset Password</title>
    <link rel="stylesheet" href="styles/auth.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f3f4f6;
        }
        .reset-password-container {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            background: white;
            border-radius: 1.25rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin: 20px;
        }
        .success-message {
            display: none;
            color: #136A4D;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        .error-message {
            display: none;
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        .input-wrapper {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #898989;
            padding: 0;
            display: flex;
            align-items: center;
            z-index: 10;
        }
        .eye-icon {
            width: 1.25rem;
            height: 1.25rem;
        }
        .hidden {
            display: none;
        }
        .form-input {
            width: 100%;
            height: 56px;
            padding: 0 3.5rem 0 1rem;
            border: 2px solid #ccc;
            border-radius: 0.5rem;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus {
            border-color: #0E58AD;
        }
    </style>
  <link rel="icon" type="image/png" href="assets/images/Aquenta_logo.png">
</head>
<body>
    <div class="reset-password-container">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #136A4D; margin-bottom: 10px;">Admin Reset</h2>
            <p style="color: #666; font-size: 0.9rem;">Set a new password for the user.</p>
        </div>

        <div id="successMessage" class="success-message">
            Password reset successfully! Redirecting to login...
        </div>
        
        <div id="errorMessage" class="error-message">
            Invalid or expired link. Please request a new one.
        </div>

        <form id="resetPasswordForm">
            <div class="input-wrapper">
                <input type="password" id="newPassword" placeholder="New Password" class="form-input" required>
                <button type="button" class="toggle-password" data-target="newPassword">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path class="eye" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                        <circle class="eye" cx="12" cy="12" r="3"></circle>
                        <line class="eye-off hidden" x1="2" x2="22" y1="2" y2="22"></line>
                    </svg>
                </button>
            </div>
            
            <div class="input-wrapper">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" class="form-input" required>
                <button type="button" class="toggle-password" data-target="confirmPassword">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path class="eye" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                        <circle class="eye" cx="12" cy="12" r="3"></circle>
                        <line class="eye-off hidden" x1="2" x2="22" y1="2" y2="22"></line>
                    </svg>
                </button>
            </div>

            <button type="submit" class="login-button" id="submitBtn">Update Password</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="auth.html" style="color: #136A4D; text-decoration: none; font-size: 0.9rem;">Back to Login</a>
        </div>
    </div>

    <script src="script/config.js"></script>
    <script src="script/api-client.js"></script>
    <script>
        // Password toggle logic
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const eyeOffLine = this.querySelector('.eye-off');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeOffLine.classList.remove('hidden');
                } else {
                    input.type = 'password';
                    eyeOffLine.classList.add('hidden');
                }
            });
        });

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('resetPasswordForm').style.display = 'none';
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = 'Invalid reset link. Token is missing.';
            errorMsg.style.display = 'block';
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${window.AQUENTA_API_BASE_URL}/User/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                if (response.ok) {
                    successMsg.style.display = 'block';
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'auth.html';
                    }, 3000);
                } else {
                    const data = await response.text();
                    errorMsg.textContent = data || 'Failed to reset password. The link may have expired.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>
</html>
