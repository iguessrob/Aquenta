<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQUENTA - Billing</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/billing.css">
  <link rel="stylesheet" href="styles/topbar-global.css">
  <link rel="icon" type="image/png" href="assets/images/Aquenta_logo.png">
</head>
<body>
  <div id="notificationContainer" class="notification-container"></div>
  <div class="app-container">
    <!-- Mobile Overlay -->
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <!-- Logo -->
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-circle">
            <img src="/assets/images/Aquenta_logo.png" alt="Aquenta Logo" class="logo-img">
          </div>
          <span class="logo-text">AQUENTA</span>
        </div>
        <button id="closeSidebar" class="close-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Navigation -->
      <nav class="nav">
        <a href="admin-dashboard" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Dashboard</span>
        </a>
        <button class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          <span>Billing</span>
        </button>
        <a href="invoices" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <span>Invoices</span>
        </a>
        <a href="customer-record" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span>Customer Records</span>
        </a>
        <a href="payment" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          <span>Payments</span>
        </a>
        <a href="tariffs" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 4v16"></path>
            <path d="M9 5h5a3.5 3.5 0 0 1 0 7H9"></path>
            <line x1="5" y1="8" x2="20" y2="8"></line>
            <line x1="5" y1="11" x2="20" y2="11"></line>
          </svg>
          <span>Tariffs</span>
        </a>
        <a href="reports" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
          <span>Reports</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-container">
      <!-- Top Bar -->
      <header class="topbar">
        <div>
          <div class="topbar-left">
            <button id="menuBtn" class="menu-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              </svg>
            </button>
            <h1 class="page-title">Billing</h1>
          </div>
          <div class="topbar-right">
            <div class="admin-info-wrapper">
              <div class="admin-info" id="adminInfoBtn">
                <div class="admin-details">
                  <span class="admin-label">Admin Staff</span>
                  <span class="admin-role">Admin Account</span>
                </div>
                <div class="admin-profile">
                  <div class="avatar" id="adminAvatar">AS</div>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron-down">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </div>
              </div>

              <!-- Profile Dropdown -->
              <div class="profile-dropdown" id="adminDropdown">
                <button class="profile-dropdown-item logout" id="adminLogoutBtn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                  </svg>
                  <span>Logout</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- Main Content Area -->
      <main class="content">
        <div class="billing-container">
          <div class="billing-header">
            <h2 class="billing-title">Billing Entry</h2>
            <button class="print-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <rect x="6" y="14" width="12" height="8"></rect>
              </svg>
              Print Reading Sheet
            </button>
          </div>

          <div class="billing-filters">
            <div class="search-box">
              <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              <input type="text" class="search-input" placeholder="Search by Name or Account #">
            </div>

            <div class="filter-group">
              <select class="filter-select">
                <option>District: All</option>
                <option>District 1</option>
                <option>District 2</option>
                <option>District 3</option>
              </select>
            </div>

            <div class="filter-group">
              <select class="date-input" id="periodFilter">
              </select>
            </div>
          </div>

          <div class="billing-content">
            <div class="empty-state">
              <svg class="empty-state-icon" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              <h3 class="empty-state-title">No records found</h3>
              <p class="empty-state-message">No customer records match your current filters. Try adjusting your search criteria or filters.</p>
            </div>
          </div>

          <div class="billing-pagination-host"></div>

          <div class="billing-actions">
            <button class="btn btn-primary" id="viewProgressBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 6 13.5 15.5 8 10 1 17"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
              </svg>
              View Progress
            </button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="billingProgressModal" class="billing-progress-modal" aria-hidden="true">
    <div class="billing-progress-backdrop" data-role="progress-modal-close"></div>
    <div class="billing-progress-dialog" role="dialog" aria-modal="true" aria-labelledby="billingProgressTitle">
      <button type="button" class="billing-progress-close" data-role="progress-modal-close" aria-label="Close progress dialog">×</button>
      <h3 id="billingProgressTitle" class="billing-progress-title">Billing Progress by Zone</h3>
      <div id="billingProgressGrid" class="billing-progress-grid"></div>
    </div>
  </div>

  <!-- SECURITY GUARD: Validate session before rendering page content -->
  <script src="/script/admin-security-guard.js"></script>
  <script src="/script/api-client.js"></script>
  <script src="/script/admin-topbar.js"></script>
  <script src="/script/billing.js"></script>
</body>
</html>
